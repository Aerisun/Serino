name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/
      - name: Format check (ruff format)
        run: uv run ruff format --check src/ tests/
      - name: Test (pytest)
        run: uv run pytest

  openapi:
    name: Export OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --dev
        working-directory: backend
      - name: Export OpenAPI spec
        run: uv run python ../scripts/export-openapi.py
        working-directory: backend
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: packages/api-client/openapi.json

  api-client:
    name: Generate API Client
    needs: [openapi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: packages/api-client/
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate API client
        run: pnpm --filter @serino/api-client run generate:api
      - uses: actions/upload-artifact@v4
        with:
          name: api-client-generated
          path: |
            packages/api-client/openapi.json
            packages/api-client/src/generated

  frontend:
    name: Frontend
    needs: [api-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: api-client-generated
          path: packages/api-client
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
        working-directory: frontend
      - run: pnpm run build
        working-directory: frontend

  admin:
    name: Admin
    needs: [api-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: api-client-generated
          path: packages/api-client
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
        working-directory: admin
      - run: pnpm run build
        working-directory: admin

  contract:
    name: Contract Tests
    needs: [backend, api-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: api-client-generated
          path: packages/api-client
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: uv sync --dev
        working-directory: backend
      - run: pnpm install --frozen-lockfile
      - name: Export backend fixtures
        run: uv run pytest tests/test_contract_fixtures.py -v
        working-directory: backend
      - name: Validate contracts
        run: pnpm --filter @serino/api-client test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t aerisun-api-test ./backend
