name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  release:
    types: [published]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to republish, for example v0.1.0
        required: true
        type: string

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event_name == 'release' && github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

env:
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_USERNAME || 'aerisun' }}
  ALIYUN_ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY != '' && vars.ALIYUN_ACR_REGISTRY || 'crpi-hwvtw8db2uk7bil0.cn-beijing.personal.cr.aliyuncs.com' }}
  ALIYUN_ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE != '' && vars.ALIYUN_ACR_NAMESPACE || 'serino' }}
  DEFAULT_IMAGE_REGISTRY: ${{ vars.AERISUN_IMAGE_REGISTRY != '' && vars.AERISUN_IMAGE_REGISTRY || 'crpi-hwvtw8db2uk7bil0.cn-beijing.personal.cr.aliyuncs.com/serino' }}

jobs:
  workspace-guards:
    name: Workspace Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - name: Enforce workspace boundaries
        run: bash ./scripts/lint-boundaries.sh
      - name: Scan tracked secrets
        run: bash ./scripts/check-secrets-staged.sh --all

  installer:
    name: Installer
    needs: [workspace-guards]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - name: Check installer shell syntax
        run: |
          find installer -type f \( -name '*.sh' -o -name 'sercli' \) -print0 | xargs -0 -n1 bash -n
          bash -n ./scripts/package-installer.sh
      - name: Package installer assets
        env:
          AERISUN_RELEASE_TAG: v0.0.0
          AERISUN_RELEASE_VERSION: 0.0.0
          AERISUN_IMAGE_REGISTRY: ${{ env.DEFAULT_IMAGE_REGISTRY }}
        run: bash ./scripts/package-installer.sh

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/
      - name: Format check (ruff format)
        run: uv run ruff format --check src/ tests/
      - name: Test (pytest)
        run: uv run pytest

  openapi:
    name: Export OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --dev
        working-directory: backend
      - name: Export OpenAPI spec
        run: uv run python ../scripts/export-openapi.py
        working-directory: backend
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: packages/api-client/openapi.json

  api-client:
    name: Generate API Client
    needs: [openapi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: packages/api-client/
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate API client
        run: pnpm --filter @serino/api-client run generate:api
      - name: Verify generated client is committed
        run: bash ./scripts/verify-generated-api-client.sh
      - uses: actions/upload-artifact@v4
        with:
          name: api-client-generated
          path: |
            packages/api-client/openapi.json
            packages/api-client/src/generated

  frontend:
    name: Frontend
    needs: [api-client, workspace-guards]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/download-artifact@v4
        with:
          name: api-client-generated
          path: packages/api-client
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
        working-directory: frontend
      - name: Type check
        run: pnpm run typecheck
        working-directory: frontend
      - run: pnpm run build
        working-directory: frontend

  admin:
    name: Admin
    needs: [api-client, workspace-guards]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/download-artifact@v4
        with:
          name: api-client-generated
          path: packages/api-client
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
        working-directory: admin
      - name: Type check
        run: pnpm run typecheck
        working-directory: admin
      - run: pnpm run build
        working-directory: admin

  contract:
    name: Contract Tests
    needs: [backend, api-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: api-client-generated
          path: packages/api-client
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: uv sync --dev
        working-directory: backend
      - run: pnpm install --frozen-lockfile
      - name: Export backend fixtures
        run: uv run pytest tests/test_contract_fixtures.py -v
        working-directory: backend
      - name: Validate contracts
        run: pnpm --filter @serino/api-client test

  docker-build:
    name: Docker Build (${{ matrix.title }})
    needs: [backend, frontend, admin, contract, installer]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: API
            release_image_name: serino-api
            dev_image_name: serino-dev-api
            image_title: Serino API
            image_description: Serino backend API service
            context: ./backend
            file: ./backend/Dockerfile
            artifact_name: ""
          - title: Web
            release_image_name: serino-web
            dev_image_name: serino-dev-web
            image_title: Serino Web
            image_description: Serino Caddy image with built frontend and admin assets
            context: .
            file: ./Dockerfile.caddy
            artifact_name: api-client-generated
          - title: Waline
            release_image_name: serino-waline
            dev_image_name: serino-dev-waline
            image_title: Serino Waline
            image_description: Serino-managed Waline service image
            context: .
            file: ./Dockerfile.waline
            artifact_name: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Download generated API client
        if: matrix.artifact_name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: packages/api-client

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ matrix.release_image_name }}
          tags: |
            type=raw,value=build-validation
          labels: |
            org.opencontainers.image.title=${{ matrix.image_title }}
            org.opencontainers.image.description=${{ matrix.image_description }}
            org.opencontainers.image.vendor=Aerisun
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}

      - name: Build validation image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: false
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.release_image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.release_image_name }}

  docker-publish-dev:
    name: Docker Publish Dev (${{ matrix.title }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [docker-smoke]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: API
            release_image_name: serino-api
            dev_image_name: serino-dev-api
            image_title: Serino API
            image_description: Serino backend API service
            context: ./backend
            file: ./backend/Dockerfile
            artifact_name: ""
          - title: Web
            release_image_name: serino-web
            dev_image_name: serino-dev-web
            image_title: Serino Web
            image_description: Serino Caddy image with built frontend and admin assets
            context: .
            file: ./Dockerfile.caddy
            artifact_name: api-client-generated
          - title: Waline
            release_image_name: serino-waline
            dev_image_name: serino-dev-waline
            image_title: Serino Waline
            image_description: Serino-managed Waline service image
            context: .
            file: ./Dockerfile.waline
            artifact_name: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Download generated API client
        if: matrix.artifact_name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: packages/api-client

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Prepare dev release metadata
        id: prep
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"

          if [[ ! "${release_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Release tag must look like v1.2.3, got '${release_tag}'" >&2
            exit 1
          fi

          version="${release_tag#v}"
          IFS='.' read -r major minor patch <<<"${version}"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "major_minor=${major}.${minor}" >> "${GITHUB_OUTPUT}"
          echo "major=${major}" >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ matrix.dev_image_name }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.version }}
            type=raw,value=${{ steps.prep.outputs.major_minor }}
            type=raw,value=${{ steps.prep.outputs.major }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.image_title }}
            org.opencontainers.image.description=${{ matrix.image_description }}
            org.opencontainers.image.vendor=Aerisun
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}

      - name: Build and publish dev image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.release_image_name }}

  docker-smoke:
    name: Docker Smoke
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    needs: [backend, frontend, admin, contract, docker-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/download-artifact@v4
        with:
          name: api-client-generated
          path: packages/api-client
      - name: Smoke test release compose with locally built images
        run: bash ./scripts/docker-smoke.sh

  docker-publish:
    name: Docker Publish Release (${{ matrix.title }})
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    needs: [docker-smoke]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: API
            release_image_name: serino-api
            dev_image_name: serino-dev-api
            image_title: Serino API
            image_description: Serino backend API service
            context: ./backend
            file: ./backend/Dockerfile
            artifact_name: ""
          - title: Web
            release_image_name: serino-web
            dev_image_name: serino-dev-web
            image_title: Serino Web
            image_description: Serino Caddy image with built frontend and admin assets
            context: .
            file: ./Dockerfile.caddy
            artifact_name: api-client-generated
          - title: Waline
            release_image_name: serino-waline
            dev_image_name: serino-dev-waline
            image_title: Serino Waline
            image_description: Serino-managed Waline service image
            context: .
            file: ./Dockerfile.waline
            artifact_name: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Download generated API client
        if: matrix.artifact_name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: packages/api-client

      - name: Prepare release metadata
        id: prep
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            release_tag="${{ github.event.release.tag_name }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${release_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Release tag must look like v1.2.3, got '${release_tag}'" >&2
            exit 1
          fi

          version="${release_tag#v}"
          IFS='.' read -r major minor patch <<<"${version}"

          echo "dockerhub_image=docker.io/${DOCKERHUB_USERNAME}/${{ matrix.release_image_name }}" >> "${GITHUB_OUTPUT}"
          echo "aliyun_image=${ALIYUN_ACR_REGISTRY}/${ALIYUN_ACR_NAMESPACE}/${{ matrix.release_image_name }}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "major_minor=${major}.${minor}" >> "${GITHUB_OUTPUT}"
          echo "major=${major}" >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.dockerhub_image }}
            ${{ steps.prep.outputs.aliyun_image }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.version }}
            type=raw,value=${{ steps.prep.outputs.major_minor }}
            type=raw,value=${{ steps.prep.outputs.major }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.image_title }}
            org.opencontainers.image.description=${{ matrix.image_description }}
            org.opencontainers.image.vendor=Aerisun
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}

      # Release publish is intentionally slimmer than build validation:
      # - publish only linux/amd64 for now
      # - reuse GHA cache via cache-from only
      # - skip provenance/attestation to reduce tail latency
      - name: Build cache import
        run: echo "Release publish reuses gha cache only; cache export stays in docker-build."

      - name: Push to registries
        run: echo "Publishing linux/amd64 images to Docker Hub and Aliyun ACR."

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.release_image_name }}

  installer-release:
    name: Installer Release Assets
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    needs: [docker-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Prepare release metadata
        id: prep
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            release_tag="${{ github.event.release.tag_name }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${release_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Release tag must look like v1.2.3, got '${release_tag}'" >&2
            exit 1
          fi

          version="${release_tag#v}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Package installer assets
        env:
          AERISUN_RELEASE_TAG: ${{ steps.prep.outputs.release_tag }}
          AERISUN_RELEASE_VERSION: ${{ steps.prep.outputs.version }}
          AERISUN_IMAGE_REGISTRY: ${{ env.DEFAULT_IMAGE_REGISTRY }}
        run: bash ./scripts/package-installer.sh

      - uses: actions/upload-artifact@v4
        with:
          name: installer-release-assets
          path: dist/installer

      - name: Publish installer release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.release_tag }}
          files: |
            dist/installer/install.sh
            dist/installer/aerisun-installer-bundle.tar.gz
            dist/installer/aerisun-installer-manifest.env
            dist/installer/docker-compose.release.yml
            dist/installer/.env.production.local.example
