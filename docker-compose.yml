services:
  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      AERISUN_HOST: ${AERISUN_HOST:-0.0.0.0}
      AERISUN_PORT: ${AERISUN_PORT:-8000}
      AERISUN_DATA_DIR: ${AERISUN_DATA_DIR:-/srv/aerisun/store}
      AERISUN_DB_PATH: ${AERISUN_DB_PATH:-/srv/aerisun/store/aerisun.db}
      AERISUN_WALINE_DB_PATH: ${AERISUN_WALINE_DB_PATH:-/srv/aerisun/store/waline.db}
      AERISUN_MEDIA_DIR: ${AERISUN_MEDIA_DIR:-/srv/aerisun/store/media}
      AERISUN_SECRETS_DIR: ${AERISUN_SECRETS_DIR:-/srv/aerisun/store/secrets}
      AERISUN_LITESTREAM_REPLICA_URL: ${AERISUN_LITESTREAM_REPLICA_URL:-sftp://backup-user@backup-host:22/backup/aerisun/aerisun.db}
      AERISUN_WALINE_LITESTREAM_REPLICA_URL: ${AERISUN_WALINE_LITESTREAM_REPLICA_URL:-sftp://backup-user@backup-host:22/backup/aerisun/waline.db}
    volumes:
      - ${AERISUN_STORE_DIR:-/srv/aerisun/store}:/srv/aerisun/store
    ports:
      - "127.0.0.1:${AERISUN_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/public/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  waline:
    image: lizheming/waline:latest
    env_file:
      - .env
    environment:
      SITE_NAME: ${AERISUN_APP_NAME:-Aerisun}
      SITE_URL: ${AERISUN_SITE_URL:-http://localhost:5173}
      SERVER_URL: ${AERISUN_WALINE_SERVER_URL:-http://localhost:8360}
      SQLITE_PATH: ${AERISUN_DATA_DIR:-/srv/aerisun/store}
      SQLITE_DB: waline.db
      JWT_TOKEN: ${WALINE_JWT_TOKEN:-change-me}
      SECURE_DOMAINS: ${WALINE_SECURE_DOMAINS:-localhost,127.0.0.1}
      AVATAR_PROXY: ${WALINE_AVATAR_PROXY:-https://avatar.75cdn.workers.dev}
      GRAVATAR_STR: ${WALINE_GRAVATAR_STR:-https://seccdn.libravatar.org/avatar/{{mail|md5}}}
    volumes:
      - ${AERISUN_STORE_DIR:-/srv/aerisun/store}:/srv/aerisun/store
    ports:
      - "127.0.0.1:${WALINE_PORT:-8360}:8360"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8360"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  litestream:
    image: litestream/litestream:latest-scratch
    env_file:
      - .env
    environment:
      AERISUN_DB_PATH: ${AERISUN_DB_PATH:-/srv/aerisun/store/aerisun.db}
      AERISUN_LITESTREAM_REPLICA_URL: ${AERISUN_LITESTREAM_REPLICA_URL:-sftp://backup-user@backup-host:22/backup/aerisun/aerisun.db}
      AERISUN_WALINE_DB_PATH: ${AERISUN_WALINE_DB_PATH:-/srv/aerisun/store/waline.db}
      AERISUN_WALINE_LITESTREAM_REPLICA_URL: ${AERISUN_WALINE_LITESTREAM_REPLICA_URL:-sftp://backup-user@backup-host:22/backup/aerisun/waline.db}
    volumes:
      - ${AERISUN_STORE_DIR:-/srv/aerisun/store}:/srv/aerisun/store
      - ./backend/litestream.yml.template:/etc/litestream.yml:ro
    depends_on:
      api:
        condition: service_healthy
      waline:
        condition: service_healthy
    command:
      - replicate
      - -config
      - /etc/litestream.yml
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      AERISUN_DOMAIN: ${AERISUN_DOMAIN:-localhost}
      AERISUN_FRONTEND_UPSTREAM: ${AERISUN_FRONTEND_UPSTREAM:-host.docker.internal:8080}
    depends_on:
      api:
        condition: service_healthy
      waline:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
