name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  release:
    types: [published]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to republish, for example v0.1.0
        required: true
        type: string

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event_name == 'release' && github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

env:
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_USERNAME || 'aerisun' }}
  ALIYUN_ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY != '' && vars.ALIYUN_ACR_REGISTRY || 'crpi-hwvtw8db2uk7bil0.cn-beijing.personal.cr.aliyuncs.com' }}
  ALIYUN_ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE != '' && vars.ALIYUN_ACR_NAMESPACE || 'serino' }}
  DEFAULT_IMAGE_REGISTRY: ${{ vars.AERISUN_IMAGE_REGISTRY != '' && vars.AERISUN_IMAGE_REGISTRY || 'crpi-hwvtw8db2uk7bil0.cn-beijing.personal.cr.aliyuncs.com/serino' }}

jobs:
  run-policy:
    name: Run Policy
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      run_full_checks: ${{ steps.policy.outputs.run_full_checks }}
      target_sha: ${{ steps.target.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - name: Resolve target commit
        id: target
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
      - name: Decide whether to rerun full checks
        id: policy
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        with:
          script: |
            const eventName = context.eventName;
            if (eventName === 'pull_request' || (eventName === 'push' && context.ref === 'refs/heads/main')) {
              core.setOutput('run_full_checks', 'true');
              return;
            }

            if (eventName === 'workflow_dispatch' || eventName === 'release') {
              const sha = process.env.TARGET_SHA;
              const workflowId = 'ci.yml';

              async function hasSuccessfulRun(event) {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflowId,
                  event,
                  status: 'completed',
                  per_page: 100,
                });
                return data.workflow_runs.some((run) => run.head_sha === sha && run.conclusion === 'success');
              }

              const alreadyTested = (await hasSuccessfulRun('push')) || (await hasSuccessfulRun('pull_request'));
              core.setOutput('run_full_checks', alreadyTested ? 'false' : 'true');
              return;
            }

            core.setOutput('run_full_checks', 'false');

  workspace-guards:
    name: Workspace Guards
    if: needs.run-policy.outputs.run_full_checks == 'true'
    needs: [run-policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - name: Enforce workspace boundaries
        run: bash ./scripts/lint-boundaries.sh
      - name: Scan tracked secrets
        run: bash ./scripts/check-secrets-staged.sh --all

  installer:
    name: Installer
    if: needs.run-policy.outputs.run_full_checks == 'true'
    needs: [run-policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - name: Check installer shell syntax
        run: |
          find installer -type f \( -name '*.sh' -o -name 'sercli' \) -print0 | xargs -0 -n1 bash -n
          bash -n ./scripts/package-installer.sh
      - name: Package installer assets
        env:
          AERISUN_RELEASE_TAG: v0.0.0
          AERISUN_RELEASE_VERSION: 0.0.0
          AERISUN_IMAGE_REGISTRY: ${{ env.DEFAULT_IMAGE_REGISTRY }}
        run: bash ./scripts/package-installer.sh

  backend:
    name: Backend (Python)
    if: needs.run-policy.outputs.run_full_checks == 'true'
    needs: [run-policy]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/
      - name: Format check (ruff format)
        run: uv run ruff format --check src/ tests/
      - name: Test (pytest)
        run: uv run pytest

  openapi:
    name: Export OpenAPI
    if: needs.run-policy.outputs.run_full_checks == 'true'
    needs: [run-policy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --dev
        working-directory: backend
      - name: Export OpenAPI spec
        run: uv run python ../scripts/export-openapi.py
        working-directory: backend
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: packages/api-client/openapi.json

  api-client:
    name: Generate API Client
    if: needs.run-policy.outputs.run_full_checks == 'true'
    needs: [run-policy, openapi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: packages/api-client/
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate API client
        run: pnpm --filter @serino/api-client run generate:api
      - name: Verify generated client is committed
        run: bash ./scripts/verify-generated-api-client.sh
      - uses: actions/upload-artifact@v4
        with:
          name: api-client-generated
          path: |
            packages/api-client/openapi.json
            packages/api-client/src/generated

  frontend:
    name: Frontend
    if: needs.run-policy.outputs.run_full_checks == 'true'
    needs: [run-policy, api-client, workspace-guards]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/download-artifact@v4
        with:
          name: api-client-generated
          path: packages/api-client
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
        working-directory: frontend
      - name: Type check
        run: pnpm run typecheck
        working-directory: frontend
      - run: pnpm run build
        working-directory: frontend

  admin:
    name: Admin
    if: needs.run-policy.outputs.run_full_checks == 'true'
    needs: [run-policy, api-client, workspace-guards]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/download-artifact@v4
        with:
          name: api-client-generated
          path: packages/api-client
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
        working-directory: admin
      - name: Type check
        run: pnpm run typecheck
        working-directory: admin
      - run: pnpm run build
        working-directory: admin

  contract:
    name: Contract Tests
    if: needs.run-policy.outputs.run_full_checks == 'true'
    needs: [run-policy, backend, api-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: api-client-generated
          path: packages/api-client
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: uv sync --dev
        working-directory: backend
      - run: pnpm install --frozen-lockfile
      - name: Export backend fixtures
        run: uv run pytest tests/test_contract_fixtures.py -v
        working-directory: backend
      - name: Validate contracts
        run: pnpm --filter @serino/api-client test

  docker-build:
    name: Docker Build (${{ matrix.title }})
    needs: [run-policy]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: API
            release_image_name: serino-api
            dev_image_name: serino-dev-api
            image_title: Serino API
            image_description: Serino backend API service
            context: ./backend
            file: ./backend/Dockerfile
          - title: Web
            release_image_name: serino-web
            dev_image_name: serino-dev-web
            image_title: Serino Web
            image_description: Serino Caddy image with built frontend and admin assets
            context: .
            file: ./Dockerfile.caddy
          - title: Waline
            release_image_name: serino-waline
            dev_image_name: serino-dev-waline
            image_title: Serino Waline
            image_description: Serino-managed Waline service image
            context: .
            file: ./Dockerfile.waline
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ matrix.release_image_name }}
          tags: |
            type=raw,value=build-validation
          labels: |
            org.opencontainers.image.title=${{ matrix.image_title }}
            org.opencontainers.image.description=${{ matrix.image_description }}
            org.opencontainers.image.vendor=Aerisun
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}

      - name: Build validation image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: false
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.release_image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.release_image_name }}

  docker-publish-dev:
    name: Docker Publish Dev (${{ matrix.title }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [docker-build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: API
            release_image_name: serino-api
            dev_image_name: serino-dev-api
            image_title: Serino API
            image_description: Serino backend API service
            context: ./backend
            file: ./backend/Dockerfile
          - title: Web
            release_image_name: serino-web
            dev_image_name: serino-dev-web
            image_title: Serino Web
            image_description: Serino Caddy image with built frontend and admin assets
            context: .
            file: ./Dockerfile.caddy
          - title: Waline
            release_image_name: serino-waline
            dev_image_name: serino-dev-waline
            image_title: Serino Waline
            image_description: Serino-managed Waline service image
            context: .
            file: ./Dockerfile.waline
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Prepare dev release metadata
        id: prep
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"

          if [[ ! "${release_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Release tag must look like v1.2.3, got '${release_tag}'" >&2
            exit 1
          fi

          version="${release_tag#v}"
          IFS='.' read -r major minor patch <<<"${version}"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "major_minor=${major}.${minor}" >> "${GITHUB_OUTPUT}"
          echo "major=${major}" >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ matrix.dev_image_name }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.version }}
            type=raw,value=${{ steps.prep.outputs.major_minor }}
            type=raw,value=${{ steps.prep.outputs.major }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.image_title }}
            org.opencontainers.image.description=${{ matrix.image_description }}
            org.opencontainers.image.vendor=Aerisun
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}

      - name: Build and publish dev image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  installer-dev-channel:
    name: Installer Dev Channel Assets
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [docker-publish-dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Prepare dev metadata
        id: prep
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"

          if [[ ! "${release_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Release tag must look like v1.2.3, got '${release_tag}'" >&2
            exit 1
          fi

          version="${release_tag#v}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "dev_base_url=${{ vars.BINFEN_INSTALL_BASE_URL }}/dev" >> "${GITHUB_OUTPUT}"

      - name: Package dev installer assets
        env:
          AERISUN_INSTALL_CHANNEL: dev
          AERISUN_RELEASE_TAG: ${{ steps.prep.outputs.release_tag }}
          AERISUN_RELEASE_VERSION: ${{ steps.prep.outputs.version }}
          AERISUN_INSTALL_BASE_URL: ${{ steps.prep.outputs.dev_base_url }}
          AERISUN_INSTALL_DOCKERHUB_NAMESPACE: ${{ env.DOCKERHUB_USERNAME }}
        run: bash ./scripts/package-installer.sh

      - name: Upload dev installer assets to Bitiful OSS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BINFEN_OSS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BINFEN_OSS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.BINFEN_OSS_REGION }}
          AWS_EC2_METADATA_DISABLED: "true"
          BINFEN_OSS_ENDPOINT: ${{ vars.BINFEN_OSS_ENDPOINT }}
          BINFEN_OSS_BUCKET: ${{ vars.BINFEN_OSS_BUCKET }}
          BINFEN_OSS_PREFIX: ${{ vars.BINFEN_OSS_PREFIX }}
          BINFEN_OSS_FORCE_PATH_STYLE: ${{ vars.BINFEN_OSS_FORCE_PATH_STYLE != '' && vars.BINFEN_OSS_FORCE_PATH_STYLE || 'false' }}
        shell: bash
        run: |
          aws --version

          prefix="${BINFEN_OSS_PREFIX#/}"
          prefix="${prefix%/}"
          if [[ -n "${prefix}" ]]; then
            root_prefix="${prefix}/dev/"
            version_prefix="${prefix}/dev/${{ steps.prep.outputs.release_tag }}/"
          else
            root_prefix="dev/"
            version_prefix="dev/${{ steps.prep.outputs.release_tag }}/"
          fi

          if [[ "${BINFEN_OSS_FORCE_PATH_STYLE}" == "true" ]]; then
            aws configure set default.s3.addressing_style path
          else
            aws configure set default.s3.addressing_style virtual
          fi

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/install.latest.sh \
            "s3://${BINFEN_OSS_BUCKET}/${root_prefix}install.sh" \
            --content-type "application/x-sh" \
            --cache-control "no-cache, no-store, must-revalidate"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/latest.env \
            "s3://${BINFEN_OSS_BUCKET}/${root_prefix}latest.env" \
            --content-type "text/plain; charset=utf-8" \
            --cache-control "no-cache, no-store, must-revalidate"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/install.sh \
            "s3://${BINFEN_OSS_BUCKET}/${version_prefix}install.sh" \
            --content-type "application/x-sh"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/aerisun-installer-bundle.tar.gz \
            "s3://${BINFEN_OSS_BUCKET}/${version_prefix}aerisun-installer-bundle.tar.gz"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/aerisun-installer-manifest.env \
            "s3://${BINFEN_OSS_BUCKET}/${version_prefix}aerisun-installer-manifest.env" \
            --content-type "text/plain; charset=utf-8"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/docker-compose.release.yml \
            "s3://${BINFEN_OSS_BUCKET}/${version_prefix}docker-compose.release.yml" \
            --content-type "text/yaml; charset=utf-8"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/.env.production.local.example \
            "s3://${BINFEN_OSS_BUCKET}/${version_prefix}.env.production.local.example" \
            --content-type "text/plain; charset=utf-8"

      - name: Refresh dev installer CDN cache
        env:
          BINFEN_CDN_API_TOKEN: ${{ secrets.BINFEN_CDN_API_TOKEN }}
          DEV_INSTALL_BASE_URL: ${{ steps.prep.outputs.dev_base_url }}
        run: |
          bash ./scripts/refresh-bitiful-cdn.sh \
            "${DEV_INSTALL_BASE_URL}/install.sh" \
            "${DEV_INSTALL_BASE_URL}/latest.env"

  release-readiness:
    name: Release Readiness
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'release') }}
    needs: [run-policy, workspace-guards, installer, backend, openapi, api-client, frontend, admin, contract]
    runs-on: ubuntu-latest
    steps:
      - name: Validate release prerequisites
        env:
          RUN_FULL_CHECKS: ${{ needs.run-policy.outputs.run_full_checks }}
          WORKSPACE_GUARDS_RESULT: ${{ needs.workspace-guards.result }}
          INSTALLER_RESULT: ${{ needs.installer.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          OPENAPI_RESULT: ${{ needs.openapi.result }}
          API_CLIENT_RESULT: ${{ needs.api-client.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          ADMIN_RESULT: ${{ needs.admin.result }}
          CONTRACT_RESULT: ${{ needs.contract.result }}
        run: |
          if [[ "${RUN_FULL_CHECKS}" != "true" ]]; then
            echo "Target commit already has successful CI checks; skip repeated full checks."
            exit 0
          fi

          for result in \
            "${WORKSPACE_GUARDS_RESULT}" \
            "${INSTALLER_RESULT}" \
            "${BACKEND_RESULT}" \
            "${OPENAPI_RESULT}" \
            "${API_CLIENT_RESULT}" \
            "${FRONTEND_RESULT}" \
            "${ADMIN_RESULT}" \
            "${CONTRACT_RESULT}"; do
            if [[ "${result}" != "success" ]]; then
              echo "Release full-check gate failed because one or more prerequisite jobs did not succeed." >&2
              exit 1
            fi
          done

  docker-smoke:
    name: Docker Smoke
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'release') && needs.release-readiness.result == 'success' && needs.docker-build.result == 'success' }}
    needs: [release-readiness, docker-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - name: Smoke test release compose with locally built images
        run: bash ./scripts/docker-smoke.sh

  docker-publish:
    name: Docker Publish Release (${{ matrix.title }})
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'release') && needs.docker-smoke.result == 'success' }}
    needs: [docker-smoke]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: API
            release_image_name: serino-api
            dev_image_name: serino-dev-api
            image_title: Serino API
            image_description: Serino backend API service
            context: ./backend
            file: ./backend/Dockerfile
          - title: Web
            release_image_name: serino-web
            dev_image_name: serino-dev-web
            image_title: Serino Web
            image_description: Serino Caddy image with built frontend and admin assets
            context: .
            file: ./Dockerfile.caddy
          - title: Waline
            release_image_name: serino-waline
            dev_image_name: serino-dev-waline
            image_title: Serino Waline
            image_description: Serino-managed Waline service image
            context: .
            file: ./Dockerfile.waline
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Prepare release metadata
        id: prep
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            release_tag="${{ github.event.release.tag_name }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${release_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Release tag must look like v1.2.3, got '${release_tag}'" >&2
            exit 1
          fi

          version="${release_tag#v}"
          IFS='.' read -r major minor patch <<<"${version}"

          echo "dockerhub_image=docker.io/${DOCKERHUB_USERNAME}/${{ matrix.release_image_name }}" >> "${GITHUB_OUTPUT}"
          echo "aliyun_image=${ALIYUN_ACR_REGISTRY}/${ALIYUN_ACR_NAMESPACE}/${{ matrix.release_image_name }}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "major_minor=${major}.${minor}" >> "${GITHUB_OUTPUT}"
          echo "major=${major}" >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.dockerhub_image }}
            ${{ steps.prep.outputs.aliyun_image }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.version }}
            type=raw,value=${{ steps.prep.outputs.major_minor }}
            type=raw,value=${{ steps.prep.outputs.major }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.image_title }}
            org.opencontainers.image.description=${{ matrix.image_description }}
            org.opencontainers.image.vendor=Aerisun
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}

      # Release publish is intentionally slimmer than build validation:
      # - publish only linux/amd64 for now
      # - reuse GHA cache via cache-from only
      # - skip provenance/attestation to reduce tail latency
      - name: Build cache import
        run: echo "Release publish reuses gha cache only; cache export stays in docker-build."

      - name: Push to registries
        run: echo "Publishing linux/amd64 images to Docker Hub and Aliyun ACR."

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.release_image_name }}

  installer-release:
    name: Installer Release Assets
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'release') && needs.docker-publish.result == 'success' }}
    needs: [docker-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Prepare release metadata
        id: prep
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            release_tag="${{ github.event.release.tag_name }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${release_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Release tag must look like v1.2.3, got '${release_tag}'" >&2
            exit 1
          fi

          version="${release_tag#v}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Package installer assets
        env:
          AERISUN_RELEASE_TAG: ${{ steps.prep.outputs.release_tag }}
          AERISUN_RELEASE_VERSION: ${{ steps.prep.outputs.version }}
          AERISUN_IMAGE_REGISTRY: ${{ env.DEFAULT_IMAGE_REGISTRY }}
          AERISUN_INSTALL_BASE_URL: ${{ vars.BINFEN_INSTALL_BASE_URL }}
        run: bash ./scripts/package-installer.sh

      - uses: actions/upload-artifact@v4
        with:
          name: installer-release-assets
          path: dist/installer

      - name: Publish installer release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.release_tag }}
          files: |
            dist/installer/install.sh
            dist/installer/aerisun-installer-bundle.tar.gz
            dist/installer/aerisun-installer-manifest.env
            dist/installer/docker-compose.release.yml
            dist/installer/.env.production.local.example

      - name: Upload installer assets to Bitiful OSS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BINFEN_OSS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BINFEN_OSS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.BINFEN_OSS_REGION }}
          AWS_EC2_METADATA_DISABLED: "true"
          BINFEN_OSS_ENDPOINT: ${{ vars.BINFEN_OSS_ENDPOINT }}
          BINFEN_OSS_BUCKET: ${{ vars.BINFEN_OSS_BUCKET }}
          BINFEN_OSS_PREFIX: ${{ vars.BINFEN_OSS_PREFIX }}
          BINFEN_OSS_FORCE_PATH_STYLE: ${{ vars.BINFEN_OSS_FORCE_PATH_STYLE != '' && vars.BINFEN_OSS_FORCE_PATH_STYLE || 'false' }}
        shell: bash
        run: |
          aws --version

          prefix="${BINFEN_OSS_PREFIX#/}"
          prefix="${prefix%/}"
          if [[ -n "${prefix}" ]]; then
            root_prefix="${prefix}/"
            version_prefix="${prefix}/${{ steps.prep.outputs.release_tag }}/"
          else
            root_prefix=""
            version_prefix="${{ steps.prep.outputs.release_tag }}/"
          fi

          if [[ "${BINFEN_OSS_FORCE_PATH_STYLE}" == "true" ]]; then
            aws configure set default.s3.addressing_style path
          else
            aws configure set default.s3.addressing_style virtual
          fi

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/install.latest.sh \
            "s3://${BINFEN_OSS_BUCKET}/${root_prefix}install.sh" \
            --content-type "application/x-sh" \
            --cache-control "no-cache, no-store, must-revalidate"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/latest.env \
            "s3://${BINFEN_OSS_BUCKET}/${root_prefix}latest.env" \
            --content-type "text/plain; charset=utf-8" \
            --cache-control "no-cache, no-store, must-revalidate"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/install.sh \
            "s3://${BINFEN_OSS_BUCKET}/${version_prefix}install.sh" \
            --content-type "application/x-sh"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/aerisun-installer-bundle.tar.gz \
            "s3://${BINFEN_OSS_BUCKET}/${version_prefix}aerisun-installer-bundle.tar.gz"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/aerisun-installer-manifest.env \
            "s3://${BINFEN_OSS_BUCKET}/${version_prefix}aerisun-installer-manifest.env" \
            --content-type "text/plain; charset=utf-8"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/docker-compose.release.yml \
            "s3://${BINFEN_OSS_BUCKET}/${version_prefix}docker-compose.release.yml" \
            --content-type "text/yaml; charset=utf-8"

          aws --endpoint-url "${BINFEN_OSS_ENDPOINT}" s3 cp dist/installer/.env.production.local.example \
            "s3://${BINFEN_OSS_BUCKET}/${version_prefix}.env.production.local.example" \
            --content-type "text/plain; charset=utf-8"

      - name: Refresh installer CDN cache
        env:
          BINFEN_CDN_API_TOKEN: ${{ secrets.BINFEN_CDN_API_TOKEN }}
          BINFEN_INSTALL_BASE_URL: ${{ vars.BINFEN_INSTALL_BASE_URL }}
        run: |
          bash ./scripts/refresh-bitiful-cdn.sh \
            "${BINFEN_INSTALL_BASE_URL}/install.sh" \
            "${BINFEN_INSTALL_BASE_URL}/latest.env"
