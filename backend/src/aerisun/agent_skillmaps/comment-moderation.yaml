id: comment-moderation
name: Comment Moderation
description: Poll pending comments, read remote MCP usage docs, and decide whether to moderate or escalate.
version: 1
when:
  mode: poll
  event: comment.pending
  interval_seconds: 60
where:
  type: mcp
  endpoint: /api/mcp
docs_url: /api/agent/usage
use_cases:
  - 审核新评论并判断是否需要人工介入
  - 根据评论上下文生成审核建议或回复草稿
workflow:
  template: comment_moderation_v1
  approval_required_for:
    - write
    - delete
    - notify
  context_keys:
    - comment_id
    - post_slug
