interface:
  display_name: "Aerisun MCP Bootstrap"
  short_description: "Validate and prepare Aerisun MCP access"
  default_prompt: "Use $aerisun-mcp-bootstrap to verify Aerisun MCP access and prepare the local runtime bundle safely."

dependencies:
  tools:
    - type: "mcp"
      value: "aerisun-mcp"
      description: "Aerisun MCP server configured through the companion .env file"
      transport: "streamable_http"
      url: "${AERISUN_MCP_ENDPOINT}"

policy:
  allow_implicit_invocation: true
